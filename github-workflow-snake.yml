# Contribution Snake — setup
#
# 1. In your profile repo (iamshubhamratra/iamshubhamratra), create this file at:
#        .github/workflows/snake.yml
#    (copy the YAML below — everything under the line)
# 2. Commit it. Then go to the repo's "Actions" tab and run "Generate Snake" once
#    (Run workflow). It creates an "output" branch with the animated snake SVG.
# 3. The README already points at that SVG, so it will start showing after the run.
#    It then auto-refreshes every 12 hours.
# ---------------------------------------------------------------------------

name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake game from contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=#39d353&color_dots=#0d1117,#0e4429,#006d32,#26a641,#39d353

      - name: Push snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

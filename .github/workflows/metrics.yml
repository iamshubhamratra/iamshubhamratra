name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: iamshubhamratra

          filename: github-metrics.svg

          config_padding: 0

          template: classic

          # Keep only essential sections
          base: header, repositories

          # Languages
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: no
          plugin_languages_ignored: html, css

          # Stars
          plugin_stars: yes

          # Disable tall sections
          plugin_isocalendar: no
          plugin_followup: no
          plugin_habits: no
          plugin_lines: no
          plugin_achievements: no
          plugin_topics: no
          plugin_people: no
          plugin_notable: no
          plugin_discussions: no
          plugin_projects: no
          plugin_repositories: no
          plugin_gists: no
